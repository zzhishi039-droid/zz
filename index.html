<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Roasters | 最高峰のコーヒー体験</title>
    <style>
        :root {
            --bg-color: #1a120f;
            --text-main: #fdf8f5;
            --text-muted: #a38c82;
            --accent-color: #d4af37; /* Gold */
            --card-bg: #261b17;
            --border-color: #3d2c25;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 4rem 1rem;
            background: linear-gradient(rgba(26, 18, 15, 0.7), rgba(26, 18, 15, 1)), url('https://images.unsplash.com/photo-1497935586351-b67a49e012bf?auto=format&fit=crop&q=80&w=1200') center/cover;
            border-bottom: 2px solid var(--accent-color);
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 2px;
            color: var(--accent-color);
        }

        header p {
            font-size: 1.2rem;
            color: #fff;
            margin-top: 1rem;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .product-section {
            text-align: center;
            margin-bottom: 4rem;
        }

        .product-section h2 {
            font-size: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            display: inline-block;
        }

        /* レビューセクションのスタイル */
        .reviews-section {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .reviews-section h3 {
            margin-top: 0;
            color: var(--accent-color);
        }

        /* フォームのスタイル */
        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .comment-form input,
        .comment-form textarea {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .comment-form input:focus,
        .comment-form textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .comment-form button {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 1rem;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .comment-form button:hover:not(:disabled) {
            opacity: 0.9;
        }

        .comment-form button:disabled {
            background-color: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        /* コメント一覧のスタイル */
        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .comment-card {
            background-color: var(--bg-color);
            padding: 1rem;
            border-radius: 4px;
            border-left: 4px solid var(--accent-color);
        }

        .comment-card h4 {
            margin: 0 0 0.5rem 0;
            color: var(--accent-color);
            font-size: 1rem;
        }

        .comment-card p {
            margin: 0 0 0.5rem 0;
            white-space: pre-wrap;
        }

        .comment-card small {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Zenith Roasters</h1>
        <p>標高2000mが育んだ、奇跡の一滴。</p>
    </header>

    <main>
        <section class="product-section">
            <h2>Grand Reserve Blend</h2>
            <p>
                厳選されたエチオピア産とコロンビア産の最高級アラビカ豆をブレンド。<br>
                ダークチョコレートのような深いコクと、ベリー系の華やかな酸味が絶妙なハーモニーを奏でます。
            </p>
        </section>

        <section class="reviews-section">
            <h3>カスタマーレビュー</h3>
            
            <form id="comment-form" class="comment-form">
                <input type="text" id="author-name" placeholder="お名前 (任意)" maxlength="30">
                <textarea id="comment-text" placeholder="商品の感想を教えてください *" rows="4" required maxlength="500"></textarea>
                <button type="submit" id="submit-btn">レビューを投稿する</button>
            </form>

            <div id="comments-list" class="comments-list">
                <!-- JavaScriptでここにコメントが追加されます -->
                <p style="color: var(--text-muted);" id="empty-message">まだレビューはありません。最初のレビューを投稿してみましょう！</p>
            </div>
        </section>
    </main>

    <!-- Firebase SDK v10 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Firebaseの設定
        const firebaseConfig = {
            // ここに自分のconfigを貼る
        };

        const form = document.getElementById('comment-form');
        const submitBtn = document.getElementById('submit-btn');
        const commentsListContainer = document.getElementById('comments-list');

        // 日付をフォーマットする関数
        function formatDate(date) {
            return `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        // 単一のコメントをDOMに追加する関数 (XSS対策のため textContent を使用)
        function createCommentElement(name, text, dateString) {
            const cardEl = document.createElement('div');
            cardEl.className = 'comment-card';

            const nameEl = document.createElement('h4');
            nameEl.textContent = name ? name : '匿名ユーザー';

            const textEl = document.createElement('p');
            textEl.textContent = text;

            const dateEl = document.createElement('small');
            dateEl.textContent = dateString;

            cardEl.appendChild(nameEl);
            cardEl.appendChild(textEl);
            cardEl.appendChild(dateEl);
            
            return cardEl;
        }

        // --- Configが空の場合（ダミー動作モード） ---
        if (Object.keys(firebaseConfig).length === 0) {
            
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const nameValue = document.getElementById('author-name').value.trim();
                const textValue = document.getElementById('comment-text').value.trim();

                if (!textValue) return;

                // 「まだレビューはありません」のメッセージを消去
                const emptyMsg = document.getElementById('empty-message');
                if (emptyMsg) emptyMsg.remove();

                // 画面上（DOM）にだけコメントを追加
                const dateString = formatDate(new Date());
                const commentEl = createCommentElement(nameValue, textValue, dateString);
                
                // 新しいコメントを一番上に追加
                commentsListContainer.prepend(commentEl);
                
                form.reset();
            });

        // --- Configが設定されている場合（Firebase通信モード） ---
        } else {
            
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);

            // コメント一覧を読み込む関数
            async function loadComments() {
                try {
                    const q = query(collection(db, "comments"), orderBy("createdAt", "desc"));
                    const querySnapshot = await getDocs(q);
                    
                    commentsListContainer.innerHTML = ''; 

                    if (querySnapshot.empty) {
                        commentsListContainer.innerHTML = '<p style="color: var(--text-muted);" id="empty-message">まだレビューはありません。最初のレビューを投稿してみましょう！</p>';
                        return;
                    }

                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        
                        let dateString = "たった今";
                        if (data.createdAt && data.createdAt.toDate) {
                            dateString = formatDate(data.createdAt.toDate());
                        }

                        const commentEl = createCommentElement(data.name, data.text, dateString);
                        commentsListContainer.appendChild(commentEl);
                    });
                } catch (error) {
                    console.error("コメントの読み込みエラー:", error);
                    commentsListContainer.innerHTML = '<p style="color: #ff6b6b;">コメントの読み込みに失敗しました。</p>';
                }
            }

            // フォーム送信時の処理
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const nameValue = document.getElementById('author-name').value.trim();
                const textValue = document.getElementById('comment-text').value.trim();

                if (!textValue) return;

                submitBtn.disabled = true;
                submitBtn.textContent = '送信中...';

                try {
                    await addDoc(collection(db, "comments"), {
                        name: nameValue,
                        text: textValue,
                        createdAt: serverTimestamp()
                    });
                    
                    form.reset();
                    await loadComments();

                } catch (error) {
                    console.error("コメントの追加エラー:", error);
                    alert("コメントの投稿に失敗しました。");
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'レビューを投稿する';
                }
            });

            // ページ読み込み時にコメントを取得
            loadComments();
        }
    </script>
</body>
</html>
